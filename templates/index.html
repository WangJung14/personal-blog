{{template "header" .}}
<main class="container">
    <h2 class="section-title">Recent Posts</h2>
    <div class="post-list">
        {{range .Posts}}
        <div class="post-item" style="display: flex; gap: 20px; align-items: flex-start; margin-bottom: 30px; border-bottom: 1px solid #e2e8f0; padding-bottom: 20px;">
            {{if .ImageURL}}
            <img src="{{.ImageURL}}" alt="Cover" style="width: 150px; height: 100px; object-fit: cover; border-radius: 8px;">
            {{end}}
            <div>
                <h3 style="margin-top: 0;"><a href="/post/{{.Slug}}">{{.Title}}</a></h3>
                <div class="post-meta" style="color: #64748b; font-size: 0.9rem;">
                    <span class="author">By {{.AuthorName}}</span> • 
                    <span class="date">{{.CreatedAt.Format "Jan 02, 2006"}}</span>
                </div>
            </div>
        </div>
        {{else}}
        <p class="empty-state">No posts yet.</p>
        {{end}}
    </div>
</main>
{{template "footer" .}}
