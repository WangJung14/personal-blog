{{template "header" .}}
<main class="container">
    <h2 class="section-title">Recent Posts</h2>
    <div class="post-list">
        {{range .Posts}}
        <div class="post-item">
            <h3><a href="/post/{{.Slug}}">{{.Title}}</a></h3>
            <span class="date">{{.CreatedAt.Format "Jan 02, 2006"}}</span>
        </div>
        {{else}}
        <p class="empty-state">No posts yet.</p>
        {{end}}
    </div>
</main>
{{template "footer" .}}
