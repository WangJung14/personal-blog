{{template "admin_header" .}}
<main class="container admin-container">
    <div class="dashboard-header">
        <h2>Manage Authors</h2>
    </div>

    <div class="card" style="background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); padding: 20px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.3); margin-bottom: 30px;">
        <form method="POST" action="/admin/authors" style="display: flex; gap: 10px; align-items: flex-end;">
            <div class="form-group" style="margin-bottom: 0; flex: 1;">
                <label>Author Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter author name" required>
            </div>
            <button type="submit" class="btn btn-primary" style="height: 42px;">Add Author</button>
        </form>
    </div>

    <div class="table-responsive">
        <table class="posts-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
            </thead>
            <tbody>
                {{range .Authors}}
                <tr>
                    <td>{{.Name}}</td>
                    <td class="actions" style="text-align: right;">
                        {{if ne .Name "Admin"}}
                        <form method="POST" action="/admin/authors/{{.ID}}/delete" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this author? All their posts will be reassigned to Admin.');">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                        {{else}}
                        <span style="color: #64748b; font-size: 0.8rem; font-style: italic;">Default Author</span>
                        {{end}}
                    </td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="2" class="text-center">No authors found.</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</main>
{{template "admin_footer" .}}
