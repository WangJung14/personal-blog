{{template "header" .}}
<main class="container post-detail">
    <div class="post-header">
        <h2>{{.Post.Title}}</h2>
        <div class="date">{{.Post.CreatedAt.Format "Jan 02, 2006"}}</div>
    </div>
    <div class="content ql-editor">
        {{.SafeContent}}
    </div>
    <div class="post-footer">
        <a href="/" class="back-link">← Back to home</a>
    </div>
</main>
{{template "footer" .}}
