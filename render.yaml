services:
  # Web Service
  - type: web
    name: personal-blog
    env: docker
    plan: free
    region: singapore # Chọn vùng gần Việt Nam nhất
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString
      - key: PORT
        value: 8080
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: admin123
      - key: SECRET_KEY
        generateValue: true # Render sẽ tự tạo mã bí mật cho bạn
    autoDeploy: true

databases:
  - name: blog-db
    plan: free
    region: singapore
